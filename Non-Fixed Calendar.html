<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NON-FIXED CALENDAR</title>
    <style>
        :root {
            --bg-color: #e8e8e8;
            --border-color: #d1d1d1;
            --accent-red: #ff4d4d;
            --text-main: #333333;
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 模拟纸质纹理 */
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            opacity: 0.05;
            pointer-events: none;
            background-image: url('https://www.transparenttextures.com/patterns/felt.png');
        }

        #container {
            position: relative;
            width: 80vw;
            height: 60vh;
            max-width: 800px;
            max-height: 500px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            cursor: pointer;
        }

        canvas {
            display: block;
        }

        .ui-label {
            position: absolute;
            bottom: -40px;
            left: 0;
            font-size: 10px;
            letter-spacing: 2px;
            color: #999;
            text-transform: uppercase;
        }

        .instruction {
            position: absolute;
            top: -30px;
            right: 0;
            font-size: 10px;
            color: var(--accent-red);
            text-transform: uppercase;
        }
          /* 返回按钮样式 */
        .back-button {
            position: absolute;
            top: 40px;
            right: 40px;
            z-index: 10;
            pointer-events: auto;
        }

        .back-button a {
            display: inline-flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            font-weight: 300;
            transition: all 0.3s ease;
            padding: 10px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            background-color: rgba(0, 0, 0, 0.2);
            backdrop-filter: blur(5px);
        }

        .back-button a:hover {
            color: rgba(255, 255, 255, 1);
            border-color: rgba(255, 255, 255, 0.3);
            background-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .back-button a:active {
            transform: translateY(0);
        }

        .back-button a svg {
            margin-right: 8px;
            width: 16px;
            height: 16px;
            opacity: 0.7;
            transition: opacity 0.3s ease;
        }

        .back-button a:hover svg {
            opacity: 1;
        }

        .ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            pointer-events: none;
            z-index: 10;
            border-left: 2px solid rgba(255,255,255,0.7);
            padding-left: 20px;
        }

        .clock-digital {
            font-size: 2.2rem;
            font-weight: 200;
            letter-spacing: 0.4rem;
            color: rgba(255, 255, 255, 1);
            line-height: 1;
        }

        .info {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
        }
         /* 自定义返回按钮样式 */
        .back-button {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            color: rgb(93, 92, 92);
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-button .arrow-circle {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(133, 131, 131, 0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .back-button .arrow-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            background: white;
            transform: scale(0);
            transition: transform 0.4s ease;
            border-radius: 50%;
            z-index: -1;
        }

        .back-button:hover .arrow-circle {
            border-color: white;
            transform: translateX(-5px);
        }

        .back-button:hover .arrow-circle::before {
            transform: scale(1);
        }

        .back-button:hover svg {
            stroke: black;
        }

        .back-button .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            opacity: 0.4;
            transition: opacity 0.4s ease;
        }

        .back-button:hover .label {
            opacity: 1;
        }

        .mix-blend-diff {
            mix-blend-mode: difference;
        }
    </style>
</head>
<body>

    <div id="container">
        <div class="instruction">Click balls to refresh date</div>
        <canvas id="canvas"></canvas>
        <div class="ui-label">NON-FIXED CALENDAR // RT.RANDOM_ TIMING BALL</div>
    </div>
<!-- 返回按钮 (返回到 Selected Works 板块) -->
    <a href="./index.html#works" class="back-button pointer-events-auto">
        <div class="arrow-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </div>
        <span class="label">Back to Works</span>
    </a>

    <script>
        const container = document.getElementById('container');
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');

        let width, height;
        let balls = [];
        const BALL_COUNT = 30;
        const RADIUS = 15; 
        const FRICTION = 0.992; 
        const INITIAL_SPEED = 8;

        const MONTHS = ["JAN", "FEB", "MAR", "APR", "MAY", "JUN", "JUL", "AUG", "SEP", "OCT", "NOV", "DEC"];

        class Ball {
            constructor(x, y, dateNum, monthStr) {
                this.x = x;
                this.y = y;
                this.radius = RADIUS;
                this.dateNum = dateNum;
                this.monthStr = monthStr;
                
                const angle = Math.random() * Math.PI * 2;
                const speed = Math.random() * INITIAL_SPEED + 2;
                this.vx = Math.cos(angle) * speed;
                this.vy = Math.sin(angle) * speed;
            }

            // 随机刷新日期的方法
            refreshDate() {
                this.dateNum = Math.floor(Math.random() * 31) + 1;
                this.monthStr = MONTHS[Math.floor(Math.random() * 12)];
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;

                this.vx *= FRICTION;
                this.vy *= FRICTION;

                if (this.x + this.radius > width) {
                    this.x = width - this.radius;
                    this.vx *= -1;
                } else if (this.x - this.radius < 0) {
                    this.x = this.radius;
                    this.vx *= -1;
                }

                if (this.y + this.radius > height) {
                    this.y = height - this.radius;
                    this.vy *= -1;
                } else if (this.y - this.radius < 0) {
                    this.y = this.radius;
                    this.vy *= -1;
                }

                balls.forEach(other => {
                    if (other === this) return;
                    const dx = other.x - this.x;
                    const dy = other.y - this.y;
                    const distance = Math.sqrt(dx * dx + dy * dy);
                    const minDistance = this.radius + other.radius;

                    if (distance < minDistance) {
                        const angle = Math.atan2(dy, dx);
                        const targetX = this.x + Math.cos(angle) * minDistance;
                        const targetY = this.y + Math.sin(angle) * minDistance;
                        const ax = (targetX - other.x) * 0.1;
                        const ay = (targetY - other.y) * 0.1;
                        this.vx -= ax;
                        this.vy -= ay;
                        other.vx += ax;
                        other.vy += ay;
                    }
                });
            }

            draw() {
                ctx.save();
                
                // 绘制轻微阴影
                ctx.shadowColor = 'rgba(0,0,0,0.1)';
                ctx.shadowBlur = 8;
                ctx.shadowOffsetY = 3;

                // 球体背景
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = '#ffffff';
                ctx.fill();
                
                ctx.shadowBlur = 0;
                ctx.shadowOffsetY = 0;

                // 提高日期数字清晰度：使用更清晰的字体大小与字重
                ctx.fillStyle = '#1a1a1a'; // 加深颜色
                ctx.font = 'bold 11px Arial, Helvetica, sans-serif'; 
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                ctx.fillText(this.dateNum, this.x, this.y - 2); // 向上微调位置给月份留空间

                // 提高月份缩写清晰度
                ctx.fillStyle = '#666'; 
                ctx.font = 'bold 6px Arial, Helvetica, sans-serif'; 
                ctx.fillText(this.monthStr, this.x, this.y + 7);

                ctx.restore();
            }
        }

        function resize() {
            width = container.clientWidth;
            height = container.clientHeight;
            // 处理高分屏清晰度
            const dpr = window.devicePixelRatio || 1;
            canvas.width = width * dpr;
            canvas.height = height * dpr;
            canvas.style.width = width + 'px';
            canvas.style.height = height + 'px';
            ctx.scale(dpr, dpr);
        }

        function init() {
            resize();
            balls = [];
            for (let i = 0; i < BALL_COUNT; i++) {
                const x = Math.random() * (width - RADIUS * 2) + RADIUS;
                const y = Math.random() * (height - RADIUS * 2) + RADIUS;
                const dateNum = Math.floor(Math.random() * 31) + 1;
                const monthStr = MONTHS[Math.floor(Math.random() * 12)];
                balls.push(new Ball(x, y, dateNum, monthStr));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, width, height);
            
            // 背景装饰线
            ctx.strokeStyle = 'rgba(0,0,0,0.03)';
            ctx.lineWidth = 1;
            for(let i=0; i<width; i+=40) {
                ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, height); ctx.stroke();
            }
            for(let i=0; i<height; i+=40) {
                ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(width, i); ctx.stroke();
            }

            balls.forEach(ball => {
                ball.update();
                ball.draw();
            });
            requestAnimationFrame(animate);
        }

        // 交互逻辑更新
        container.addEventListener('click', (e) => {
            const rect = canvas.getBoundingClientRect();
            const mouseX = e.clientX - rect.left;
            const mouseY = e.clientY - rect.top;

            balls.forEach(ball => {
                const dx = ball.x - mouseX;
                const dy = ball.y - mouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                // 判断是否点击到了小球
                if (dist < ball.radius + 10) {
                    ball.refreshDate(); // 刷新日期
                }

                // 动力注入
                const force = Math.max(0, (200 - dist) / 15);
                const angle = Math.atan2(dy, dx);
                ball.vx += Math.cos(angle) * force;
                ball.vy += Math.sin(angle) * force;
            });
        });

        window.addEventListener('resize', resize);

        init();
        animate();
    </script>
</body>
</html>
