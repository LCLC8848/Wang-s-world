<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memory Wheel - Explosive Memphis Core</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            background-color: #000000;
            color: #ffffff;
            /* 恢复为更具现代感的无衬线字体系统 */
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
     }

        #canvas-container {
            width: 100vw;
            height: 100vh;
        }

        .ui-overlay {
            position: absolute;
            bottom: 40px;
            left: 40px;
            pointer-events: none;
            z-index: 10;
            border-left: 2px solid rgba(255,255,255,0.7);
            padding-left: 20px;
        }

        .clock-digital {
            font-size: 2.2rem;
            font-weight: 200; /* 调细字重增加高级感 */
            letter-spacing: 0.4rem;
            color: rgba(255, 255, 255, 1);
            line-height: 1;
        }

        .info {
            font-size: 0.7rem;
            opacity: 0.6;
            margin-top: 8px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 400;
        }
         /* 自定义返回按钮样式 */
        .back-button {
            position: fixed;
            top: 40px;
            left: 40px;
            z-index: 100;
            display: flex;
            align-items: center;
            gap: 12px;
            color: white;
            text-decoration: none;
            transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-button .arrow-circle {
            width: 40px;
            height: 40px;
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
        }

        .back-button .arrow-circle::before {
            content: '';
            position: absolute;
            inset: 0;
            background: white;
            transform: scale(0);
            transition: transform 0.4s ease;
            border-radius: 50%;
            z-index: -1;
        }

        .back-button:hover .arrow-circle {
            border-color: white;
            transform: translateX(-5px);
        }

        .back-button:hover .arrow-circle::before {
            transform: scale(1);
        }

        .back-button:hover svg {
            stroke: black;
        }

        .back-button .label {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.4em;
            opacity: 0.4;
            transition: opacity 0.4s ease;
        }

        .back-button:hover .label {
            opacity: 1;
        }

        .mix-blend-diff {
            mix-blend-mode: difference;
        }
        
    </style>
</head>
<body>
  <!-- 返回按钮 (返回到 Selected Works 板块) -->
    <a href="./WELCOME TO WANG'S WORLD.html#works" class="back-button pointer-events-auto">
        <div class="arrow-circle">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M19 12H5M12 19l-7-7 7-7"/>
            </svg>
        </div>
        <span class="label">Back to Works</span>
    </a>
        
    

    <div class="ui-overlay">
        <div class="clock-digital" id="digital-clock">00:00:00</div>
        <div class="info">CHRONOS MEMORY WHEEL  //  STACKED VOID PROTOCOL</div>
    </div>
       <div id="canvas-container"></div>
     

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/geometries/ConvexGeometry.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/math/ConvexHull.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

    <script>
        let scene, camera, renderer, controls;
        let layers = { hour: null, minute: null, second: null };
        let memphisCore;
        const CLOCK_RADIUS = 5;
        const LAYER_HEIGHTS = [4, 0, -4]; 
        
        const MEMPHIS_PALETTE = [
            0xFFEE00, 0x00A0FF, 0xFF0033, 0xFF66FF, 0x00FF99, 0x9900FF, 0x00FFFF
        ];

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x000000);

            camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(15, 12, 15);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.getElementById('canvas-container').appendChild(renderer.domElement);

            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            const ambient = new THREE.AmbientLight(0xffffff, 1.0);
            scene.add(ambient);

            memphisCore = createMemphisCore();
            scene.add(memphisCore);

            layers.hour = createStackLayer(CLOCK_RADIUS, LAYER_HEIGHTS[0], 0xffffff, 12);
            layers.minute = createStackLayer(CLOCK_RADIUS * 0.9, LAYER_HEIGHTS[1], 0xcccccc, 60);
            layers.second = createStackLayer(CLOCK_RADIUS * 0.8, LAYER_HEIGHTS[2], 0x888888, 60);

            scene.add(layers.hour.group);
            scene.add(layers.minute.group);
            scene.add(layers.second.group);

            window.addEventListener('resize', onWindowResize, false);
            animate();
        }

        function createMemphisCore() {
            const group = new THREE.Group();
            const fragmentCount = 200; 
            const maxRadius = 3.5;

            for (let i = 0; i < fragmentCount; i++) {
                const vector = new THREE.Vector3(
                    Math.random() - 0.5,
                    Math.random() - 0.5,
                    Math.random() - 0.5
                ).normalize();
                
                const dist = Math.pow(Math.random(), 0.7) * maxRadius;
                const pos = vector.clone().multiplyScalar(dist);
                const size = 0.05 + Math.random() * 0.35; 

                let geometry;
                const rand = Math.random();
                if (rand < 0.4) {
                    geometry = new THREE.PlaneGeometry(size, size);
                } else if (rand < 0.7) {
                    geometry = new THREE.CircleGeometry(size / 2, 3); 
                } else {
                    geometry = new THREE.CircleGeometry(size / 2, 32); 
                }

                const opacity = Math.max(0.1, 1.0 - (dist / maxRadius));

                const material = new THREE.MeshBasicMaterial({
                    color: MEMPHIS_PALETTE[Math.floor(Math.random() * MEMPHIS_PALETTE.length)],
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: opacity
                });

                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.copy(pos);
                mesh.lookAt(0, 0, 0); 
                
                mesh.userData = {
                    originPos: mesh.position.clone(),
                    direction: vector,
                    speed: 0.002 + Math.random() * 0.005,
                    dist: dist
                };

                group.add(mesh);
            }

            return group;
        }

        function createStackLayer(radius, yPos, color, tickCount) {
            const group = new THREE.Group();
            group.position.y = yPos;

            const ringGroup = new THREE.Group();
            const createRing = (offset = 0) => {
                const ringPos = [];
                const r = radius + offset;
                for(let i=0; i<tickCount; i++) {
                    const a = (i/tickCount) * Math.PI * 2;
                    const x = Math.cos(a) * r;
                    const z = Math.sin(a) * r;
                    const x2 = Math.cos(a) * (r * 1.1);
                    const z2 = Math.sin(a) * (r * 1.1);
                    ringPos.push(x, 0, z, x2, 0, z2);
                }
                const ringGeo = new THREE.BufferGeometry();
                ringGeo.setAttribute('position', new THREE.Float32BufferAttribute(ringPos, 3));
                return new THREE.LineSegments(ringGeo, new THREE.LineBasicMaterial({ color: color, transparent: true, opacity: 0.3 }));
            };

            ringGroup.add(createRing(0));
            ringGroup.add(createRing(0.01));
            ringGroup.add(createRing(-0.01));
            group.add(ringGroup);

            const points = [];
            const pointSpheres = [];
            for(let i=0; i<6; i++) {
                const p = new THREE.Vector3();
                points.push(p);
                const dot = new THREE.Mesh(
                    new THREE.SphereGeometry(0.08, 16, 16),
                    new THREE.MeshBasicMaterial({ color: 0xffffff })
                );
                group.add(dot);
                pointSpheres.push(dot);
            }

            const hullMat = new THREE.MeshPhongMaterial({
                color: 0xffffff,
                transparent: true,
                opacity: 0.12,
                wireframe: true,
                side: THREE.DoubleSide
            });

            return { group, points, pointSpheres, hullMat, radius, tickCount, currentHull: null };
        }

        function updateLayer(layer, value, total) {
            const angle = (value / total) * Math.PI * 2 - (Math.PI / 2);
            const targetX = Math.cos(angle) * layer.radius;
            const targetZ = -Math.sin(angle) * layer.radius;
            const time = Date.now() * 0.001;

            layer.points.forEach((p, i) => {
                const offsetAngle = (i / layer.points.length) * Math.PI * 2 + time;
                const noise = 0.7;
                p.x = targetX + Math.cos(offsetAngle) * noise;
                p.z = targetZ + Math.sin(offsetAngle) * noise;
                p.y = Math.sin(time + i) * 0.5;
                layer.pointSpheres[i].position.copy(p);
            });

            if (layer.currentHull) layer.group.remove(layer.currentHull);
            try {
                const hullGeo = new THREE.ConvexGeometry(layer.points);
                const mesh = new THREE.Mesh(hullGeo, layer.hullMat);
                layer.currentHull = mesh;
                layer.group.add(mesh);
            } catch(e) {}
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            const now = new Date();
            const h = now.getHours();
            const m = now.getMinutes();
            const s = now.getSeconds();
            const ms = now.getMilliseconds();

            const time = Date.now() * 0.001;
            if(memphisCore) {
                memphisCore.children.forEach((fragment, i) => {
                    const ud = fragment.userData;
                    const pulse = Math.sin(time * 2 + i) * 0.15;
                    fragment.position.copy(ud.originPos).add(ud.direction.clone().multiplyScalar(pulse));
                    fragment.rotation.z += ud.speed * 5;
                    fragment.rotation.y += ud.speed * 2;
                });
            }

            updateLayer(layers.hour, (h % 12) + m / 60, 12);
            updateLayer(layers.minute, m + s / 60, 60);
            updateLayer(layers.second, s + ms / 1000, 60);

            const format = (v) => v.toString().padStart(2, '0');
            document.getElementById('digital-clock').innerText = `${format(h)}:${format(m)}:${format(s)}`;

            controls.update();
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
