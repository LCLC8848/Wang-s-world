<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wang's World | Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@100;300;400;700&display=swap');
        
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050505;
            color: white;
            font-family: 'Inter', sans-serif;
            user-select: none;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 0;
        }

        .content-layer {
            position: relative;
            z-index: 10;
            pointer-events: none;
        }

        .mix-blend-diff {
            mix-blend-mode: difference;
        }

        /* 进场动画 */
        .fade-in-up {
            animation: fadeInUp 2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
            opacity: 0;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .line-grow {
            animation: lineGrow 1.5s ease-in-out 1.2s forwards;
            transform: scaleX(0);
        }

        @keyframes lineGrow {
            to { transform: scaleX(1); }
        }

        .custom-serif {
            font-family: 'Georgia', serif;
        }
    </style>
</head>
<body>

    <!-- 导航栏 -->
    <nav class="fixed top-0 left-0 w-full z-50 flex justify-between items-center px-10 py-10 pointer-events-none mix-blend-diff">
        <div class="text-xl font-bold tracking-tighter italic opacity-90 pointer-events-auto">W.STUDIO</div>
        <div class="hidden md:flex gap-12 text-[10px] uppercase tracking-[0.5em] font-light opacity-40"></div>
         <!-- 右边: 桌面导航 + 移动端汉堡菜单 -->
    <div class="flex items-center pointer-events-auto">
        <!-- 桌面导航链接 (隐藏在小屏幕上) -->
        <div class="hidden md:flex items-center gap-5">
            <a href="./Folder.html" class="group relative">
                <div class="absolute -top-2 left-0 w-0 h-[1px] bg-white/60 group-hover:w-full transition-all duration-300"></div>
                <span class="text-xs uppercase tracking-[0.3em] font-light opacity-60 hover:opacity-100 transition-opacity duration-200">About Me</span>
                <div class="absolute -bottom-2 left-0 w-full h-[1px] bg-white/30 group-hover:bg-white/60 transition-colors duration-300"></div>
            </a>
            
            <a href="./Selected Works.html" class="group relative">
                <div class="absolute -top-2 left-0 w-0 h-[1px] bg-white/60 group-hover:w-full transition-all duration-300"></div>
                <span class="text-xs uppercase tracking-[0.3em] font-light opacity-60 hover:opacity-100 transition-opacity duration-200">Selected Works</span>
                <div class="absolute -bottom-2 left-0 w-full h-[1px] bg-white/30 group-hover:bg-white/60 transition-colors duration-300"></div>
            </a>
            
            <a href="#" class="group relative">
                <div class="absolute -top-2 left-0 w-0 h-[1px] bg-white/60 group-hover:w-full transition-all duration-300"></div>
                <span class="text-xs uppercase tracking-[0.3em] font-light opacity-60 hover:opacity-100 transition-opacity duration-200">Calender</span>
                <div class="absolute -bottom-2 left-0 w-full h-[1px] bg-white/30 group-hover:bg-white/60 transition-colors duration-300"></div>
            </a>
        </div>
        
        <!-- 移动端汉堡菜单按钮 (只在手机显示) -->
        <button class="md:hidden flex flex-col gap-1 pointer-events-auto">
            <div class="w-6 h-[1px] bg-white/60"></div>
            <div class="w-6 h-[1px] bg-white/60"></div>
            <div class="w-6 h-[1px] bg-white/60"></div>
        </button>
    </div>
</nav>

    <!-- 3D 渲染容器 -->
    <div id="three-container" class="absolute inset-0"></div>

    <!-- UI 文字图层 -->
    <main class="content-layer flex flex-col items-center justify-center h-screen text-center px-6">
        <div id="main-ui" class="hidden">
            <div class="fade-in-up text-[9px] uppercase tracking-[0.8em] mb-12 font-light opacity-30">
                Visual Arts & Interaction Design
            </div>
            
            <h1 class="fade-in-up text-4xl md:text-7xl lg:text-8xl font-thin tracking-tight leading-[1.1] custom-serif" style="animation-delay: 0.2s;">
                WELCOME TO <br />
                <span class="italic font-extralight opacity-80">WANG'S WORLD</span>
            </h1>

            <div class="line-grow w-24 h-[1px] bg-gradient-to-r from-transparent via-white/40 to-transparent mt-16 mx-auto opacity-50"></div>
        </div>
    </main>

    <!-- 底部装饰信息 -->
    <div class="fixed right-12 bottom-12 z-20 text-[9px] tracking-[0.4em] opacity-20 text-right uppercase leading-relaxed">
        Curating Digital Silence<br/>
        Est. 2026 / Chengdu, China
    </div>

    <div class="fixed left-12 bottom-12 z-20 hidden lg:block opacity-10">
        <div class="text-[8px] uppercase tracking-[0.5em] origin-left -rotate-90 -translate-y-full">
            Selection 01 / Series A
        </div>
    </div>

    <!-- 全局渐变遮罩 -->
    <div class="fixed inset-0 pointer-events-none bg-[radial-gradient(circle_at_50%_50%,rgba(255,255,255,0.03)_0%,rgba(0,0,0,0)_85%)]"></div>

    <script>
        // --- 核心配置 ---
        const CONFIG = {
            objectCount: 28,
            colors: [0xFFFFFF, 0xEEEEEE, 0xFFD700, 0x00E5FF, 0xFF2D55],
            assetTypes: ['polaroid', 'notebook', 'sticker', 'tape']
        };

        let scene, camera, renderer, assets = [];
        const mouse = new THREE.Vector2(0, 0);

        function init() {
            // 场景初始化
            scene = new THREE.Scene();
            camera = new THREE.PerspectiveCamera(35, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 12;

            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
            renderer.setClearColor(0x050505, 1);
            document.getElementById('three-container').appendChild(renderer.domElement);

            // 灯光
            const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 1.2);
            pointLight.position.set(10, 10, 10);
            scene.add(pointLight);

            const accentLight = new THREE.PointLight(0x00ffff, 0.5);
            accentLight.position.set(-10, -10, -5);
            scene.add(accentLight);

            // 创建几何体模板
            const geometries = {
                polaroid: new THREE.BoxGeometry(1.2, 1.5, 0.05),
                notebook: new THREE.BoxGeometry(1.4, 1.8, 0.1),
                sticker: new THREE.CircleGeometry(0.7, 32),
                tape: new THREE.PlaneGeometry(1.5, 0.4)
            };

            // 生成随机物体
            for (let i = 0; i < CONFIG.objectCount; i++) {
                const type = CONFIG.assetTypes[i % CONFIG.assetTypes.length];
                const material = new THREE.MeshStandardMaterial({
                    color: CONFIG.colors[i % CONFIG.colors.length],
                    roughness: 0.4,
                    metalness: 0.3,
                    side: THREE.DoubleSide
                });

                const mesh = new THREE.Mesh(geometries[type], material);
                
                const pos = {
                    x: (Math.random() - 0.5) * 16,
                    y: (Math.random() - 0.5) * 10,
                    z: (Math.random() - 0.5) * 6
                };

                mesh.position.set(pos.x, pos.y, pos.z);
                mesh.rotation.set(Math.random() * Math.PI, Math.random() * Math.PI, Math.random() * Math.PI);
                
                const scale = 0.5 + Math.random() * 0.5;
                mesh.scale.set(scale, scale, scale);

                assets.push({
                    mesh,
                    origin: pos,
                    speed: 0.15 + Math.random() * 0.3,
                    offset: Math.random() * 20
                });
                
                scene.add(mesh);
            }

            // 事件监听
            window.addEventListener('resize', onWindowResize);
            window.addEventListener('mousemove', onMouseMove);

            // 显示 UI
            setTimeout(() => {
                document.getElementById('main-ui').classList.remove('hidden');
            }, 800);

            animate();
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function onMouseMove(e) {
            mouse.x = (e.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(e.clientY / window.innerHeight) * 2 + 1;
        }

        function animate() {
            requestAnimationFrame(animate);
            const t = performance.now() * 0.001;

            assets.forEach(asset => {
                const { mesh, origin, speed, offset } = asset;

                // 浮动
                const floatY = Math.sin(t * speed + offset) * 0.3;
                mesh.position.y = THREE.MathUtils.lerp(mesh.position.y, origin.y + floatY, 0.05);
                mesh.rotation.x += 0.003;
                mesh.rotation.y += 0.002;

                // 鼠标交互 (排斥力)
                const targetMouseX = mouse.x * 10;
                const targetMouseY = mouse.y * 6;
                const dx = mesh.position.x - targetMouseX;
                const dy = mesh.position.y - targetMouseY;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < 4.0) {
                    const force = (4.0 - dist) * 0.02;
                    mesh.position.x += dx * force;
                    mesh.position.y += dy * force;
                } else {
                    mesh.position.x = THREE.MathUtils.lerp(mesh.position.x, origin.x, 0.02);
                }
            });

            renderer.render(scene, camera);
        }

        // 启动场景
        window.onload = init;
    </script>
</body>
</html>
